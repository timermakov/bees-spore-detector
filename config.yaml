# ========== OpenCV Configuration ==========
# Путь к папке с изображениями. Файлы должны иметь формат <имя>_1.jpg, <имя>_2.jpg, <имя>_3.jpg
data_dir: bees_dataset#3_2025-08-22_tiles
# Папка для результатов (.md, debug изображения, отчёт Excel)
results_dir: bees_dataset#3_2025-08-22_tiles

# Параметры обработки (влияние на детекцию см. bees/image_proc.py)
# Минимальная/максимальная площадь эллиптического потенциального контура (пиксели)
min_contour_area: 45
max_contour_area: 650
# Минимальная/максимальная площадь определённого эллипса (пиксели)
min_ellipse_area: 100
max_ellipse_area: 360
# Пороговые значения алгоритма Canny
canny_threshold1: 40
canny_threshold2: 120
# Минимальная длина контура (число точек) для эллипса
min_spore_contour_length: 7
# Порог по интенсивности: насколько средняя яркость внутри эллипса может отличаться от фона
intensity_threshold: 36

# Параметры зоны анализа (зелёный квадрат)
# Размер квадрата в пикселях
analysis_square_size: 780
# Толщина линии квадрата в пикселях
analysis_square_line_width: 2

# ========== YOLO Configuration ==========
yolo_datasets_root: dataset_train
yolo_dataset_folder_pattern: "*"
# optional parameter, needs if every portion has same xml filename:
# yolo_annotations_filename: annotations_orig_2025-08-22.xml

# Use this structure for incremental retraining:
# dataset_train/portion_001/...images... + annotation XML
# dataset_train/portion_002/...images... + annotation XML
# dataset_train/portion_003/...images... + annotation XML

# Модель YOLO11-S
yolo_model: yolo11s.pt
# Порог уверенности детекции [0-1]
yolo_confidence: 0.25
# Порог IoU для NMS [0-1]
yolo_iou_threshold: 0.45
# Количество эпох обучения
yolo_epochs: 100
# Размер батча (уменьшить при нехватке памяти)
yolo_batch_size: 2
# Размер изображения для обучения/инференса (больше = точнее, но медленнее)
yolo_imgsz: 1024

# ========== Tiley (нарезка CVAT + тайловый YOLO-инференс) ==========
# Параметры по умолчанию для: python -m bees.main --export-tiled-cvat / --predict-tiled
# CLI-флаги при наличии переопределяют значения из этого раздела.
tiley:
  export:
    # Пути к данным (если заданы — можно вызывать --export-tiled-cvat без --tiled-cvat-xml / --tiled-images-dir)
    cvat_xml: null
    images_dir: null
    out: tiled_pascal_export
    tile_size: 512
    overlap: 0.25
    negative_ratio: 0.1
    # null = случайный сид при каждом запуске
    seed: null
  predict:
    source: dataset_test
    out: results/tiled_predictions
    # null = взять yolo_imgsz из секции YOLO выше
    tile_size: null
    overlap: 0.2
    merge_iou: 0.15
    # null = взять yolo_confidence
    conf: null
    # null = взять yolo_imgsz
    imgsz: null
    use_clahe: true
    write_previews: true
    # null = веса по пути из YOLO (models/.../best.pt); иначе путь к .pt
    weights: null
