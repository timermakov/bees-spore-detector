# ========== OpenCV Configuration ==========
# Path to images folder.
data_dir: bees_dataset#3_2025-08-22_tiles
# Folder for results (.md, debug images, Excel report)
results_dir: bees_dataset#3_2025-08-22_tiles

# Processing parameters (see bees/image_proc.py for detection details)
# Min/max area of elliptical potential contour (pixels)
min_contour_area: 45
max_contour_area: 650
# Min/max area of confirmed ellipse (pixels)
min_ellipse_area: 100
max_ellipse_area: 360
# Canny algorithm threshold values
canny_threshold1: 40
canny_threshold2: 120
# Minimum contour length (number of points) for ellipse
min_spore_contour_length: 7
# Intensity threshold: how much average brightness inside ellipse can differ from background
intensity_threshold: 36

# Analysis zone parameters (green square)
# Square size in pixels
analysis_square_size: 780
# Volume coefficient for titer calculation (million spores/ml)
# Formula: titer = N_spores_on_photo / (volume_factor * (S_photo / S_analysis_square²) * N_photos)
volume_factor: 4.0
# Square line width in pixels (to see square on UI for user)
analysis_square_line_width: 2

# ========== YOLO Configuration ==========
yolo_datasets_root: dataset_train
yolo_dataset_folder_pattern: "*"
# optional parameter, needs if every portion has same xml filename:
# yolo_annotations_filename: annotations_orig_2025-08-22.xml

# Use this structure for incremental retraining:
# dataset_train/portion_001/...images... + annotation XML
# dataset_train/portion_002/...images... + annotation XML
# dataset_train/portion_003/...images... + annotation XML

# YOLO11-S model
yolo_model: yolo11s.pt
# Detection confidence threshold [0-1]
yolo_confidence: 0.25
# IoU threshold for NMS [0-1]
yolo_iou_threshold: 0.45
# Number of training epochs
yolo_epochs: 100
# Batch size (decrease if out of memory)
yolo_batch_size: 2
# Image size for training/inference (larger = more accurate but slower)
yolo_imgsz: 1024

# ========== Tiley / SAHI (YAML-first) ==========
# Commands:
#   python -m bees.main tile-export [--input ...] [--out ...]
#   python -m bees.main tile-predict [--input ...] [--out ...]
# All quality/inference parameters are taken from YAML only.
tiley:
  export:
    # Folder with source images (can override via tile-export --input)
    input: sahi_tiled_export
    # Path to CVAT XML; if null, will try to use <input>/annotations.xml
    cvat_xml: null
    # Result folder (can override via tile-export --out)
    out: sahi_tiled_export
    # Square tile: tile_size x tile_size
    tile_size: 512
    overlap: 0.25
  predict:
    # Folder with images for inference (can override via tile-predict --input)
    input: dataset_test
    # Result folder (can override via tile-predict --out)
    out: results/sahi_tiled_predictions
    # Square tile: tile_size x tile_size
    tile_size: 512
    overlap: 0.2
    conf: 0.25
    write_previews: true
    # null = yolo_model from YOLO section above
    weights: runs/detect/models/yolo11s_spores_2026-04-15_512_1024/weights/best.pt
    device: cuda:0
    model_type: ultralytics
